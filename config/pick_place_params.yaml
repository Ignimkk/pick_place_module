# =============================================================
# pick_place_params.yaml
#
# pick_place_node, goal_relay_node, motion_logger_node 파라미터.
# 런치 파일에서 parameters=[config] 로 로드함.
# =============================================================

pick_place_node:
  ros__parameters:

    # MoveIt2 planning group 이름
    arm_group: "ur_manipulator"

    # 그리핑/플레이싱 전 Z축 접근 오프셋 [m]
    pre_grasp_offset: 0.10

    # 그리퍼 위치 [m]
    # robotiq_2f_85: 완전 열림=0.0, 완전 닫힘≈0.085
    # (시뮬레이션에서는 0.0~0.8 스케일 사용)
    gripper_open_pos:  0.0
    gripper_close_pos: 0.8

    # 그리퍼 최대 토크 [N]
    gripper_max_effort: 50.0

    # 그리퍼 응답 대기 타임아웃 [s]
    gripper_timeout_sec: 10.0

    # 속도·가속도 스케일링 (0.0 ~ 1.0)
    velocity_scaling:     0.3
    acceleration_scaling: 0.3

    # RRTConnect 계획 파라미터 (전 구간 RRTConnect 사용)
    planning_time:         10.0  # 최대 계획 허용 시간 [s]
    num_planning_attempts: 20    # 계획 실패 시 재시도 횟수

    # 하향 orientation 폴백값
    # 기본 동작은 현재 EE yaw 에 가장 가까운 하향 자세를 deterministic 하게 계산.
    # 현재 상태/EE 링크를 읽지 못할 때만 아래 고정 quaternion 으로 폴백한다.
    grasp_orientation_x: 0.0
    grasp_orientation_y: 1.0
    grasp_orientation_z: 0.0
    grasp_orientation_w: 0.0

    # ── setFromIK + 비용 함수 파라미터 ───────────────────────────
    # 참조 코드(edgebrain_blockpnp)와 동일하게 L2 norm 단일 항만 사용.
    # kinematics.yaml: mode: global 설정 권장.

    # IK 탐색 최대 허용 시간 [s]
    # setFromIK 실패 시 planAndExecute(setPoseTarget) 로 fallback 됨.
    ik_timeout: 0.5

    # L2 norm 가중치
    #   0.0002 : 거의 무시 — bio_ik 가 임의 분기로 수렴 가능
    #   0.05   : pre_grasp/pre_place IK 가 grasp/place 분기에 강하게 묶임 (권장)
    #   0.5+   : 도달성보다 분기 일관성 우선 — 멀리 있는 target 에서 IK 실패 ↑
    ik_cost_weight_l2: 0.05

    # PnP 완료 후 초기 관절 자세로 복귀
    return_home_after_place: true
    initial_positions_path: "/home/mk/dev_ws/robot_arm/UR/ur_setup_ws/src/ur_setup_ws/config/initial_positions.yaml"

    # ── 강하 경로 충돌 검증 (pre_pose → final_pose) ───────────────
    # pre_grasp → grasp / pre_place → place 사이를 joint-space 보간하여
    # 각 단계마다 PlanningScene 충돌(self + world) 을 검사한다.
    # 충돌 시 IK 를 다른 seed/random restart 로 재시도.
    descent_check_steps:    15    # 보간 단계 수 (10–20 권장)
    descent_max_ik_retries: 4     # IK 최대 재시도 횟수 (3–5 권장)

    # ── Trajectory Optimization 통합 파라미터 ────────────────────
    # use_trajopt=false (기본): 기존 MoveIt2 execute 동작 유지
    # use_trajopt=true : RRT 계획 후 trajopt_server_node 로 최적화 수행
    #
    # 활성화 전 요구 사항:
    #   1. ur_setup_ws 빌드 후 source (TrajOpt action 타입 생성)
    #   2. trajopt_ws 빌드 후 source (trajopt_server_node 설치)
    #   3. trajopt_server_node 실행:
    #      ros2 run trajopt_validation trajopt_server_node

    use_trajopt: false                  # true → TrajOpt 활성화

    # trajopt_server_node 연결 대기 시간 [s]
    # 서버가 없으면 MoveIt2 execute 로 폴백
    trajopt_server_timeout_sec: 2.0

    # 초기 시간 추정 [s] — solver의 T_init 값
    # RRT trajectory 마지막 점의 시간이 이보다 크면 자동으로 대체됨
    t_init_sec: 3.0

    # Chebyshev 차수 N (노드 수 = N+1)
    # N=6 → 7 노드, 43 결정변수, SLSQP ~0.3–1.0 s  ← 3초 예산 권장
    # N=8 → 9 노드, 109 결정변수, SLSQP ~2–5 s
    trajopt_N: 6

    # reduced-space solver 사용 여부
    # true : z=[q; T], 43 vars, 24 constraints → 빠름, 토크 한계 미강제
    # false: x=[q; τ; T], 85 vars, 66 constraints → 느림, 토크 한계 강제
    trajopt_use_reduced: true

    # T_f 최적화 여부 (free-T NLP)
    # true  → 궤적 시간을 최소화 대상으로 포함 (권장)
    # false → T_init_sec 고정 (kinematic solve)
    trajopt_use_free_t: true

    # 실행 완료 여유 시간 [s] (T_opt + 이 값만큼 대기 후 다음 스텝 진행)
    traj_exec_margin_sec: 1.5

    # ── Experiment comparison framework ──────────────────────────────
    # experiment_mode 선택:
    #   "rrt_only"     : MoveIt2 RRTConnect 실행만
    #   "trajopt_only" : TrajOpt (Hermite 초기 추정, RRT 경로 없음)
    #   "rrt_trajopt"  : RRT → TrajOpt (현재 파이프라인, 기본값)
    experiment_mode: "rrt_trajopt"

    # 실험 CSV 저장 경로 (비어있으면 ~/.ros/pick_place_exp/TIMESTAMP_results.csv)
    experiment_csv_path: ""

    # ── pre_grasp → grasp 접근 전략 ───────────────────────────────────
    # "vertical_cartesian" (기본):
    #     pre_pose ↔ final_pose 사이를 N 개 Cartesian waypoint 로 분할.
    #     x/y/orientation 은 final_pose 값으로 고정, z 만 단조 변화 →
    #     EE 가 수직 강하/후퇴 보장. RRT/TrajOpt 결정에 의해 휘는
    #     joint 경로 문제를 회피.
    # "joint":
    #     사전 계산한 IK 로 RRT/TrajOpt 관절 plan 실행. 충돌 인지는
    #     강하지만 EE 경로가 휠 수 있음.
    # "cartesian":
    #     computeCartesianPath 단일 waypoint (레거시; 자주 path
    #     incomplete 발생).
    approach_strategy: "vertical_cartesian"

    # vertical_cartesian 분할 waypoint 수 (5–20 권장)
    # ↑ 많을수록 IK 추적 안정성 ↑, computeCartesianPath 비용 ↑
    vertical_cartesian_waypoints: 10

    # Cartesian 접근/후퇴 공통 파라미터
    # (approach_strategy = "cartesian" / "vertical_cartesian" 모두 사용)
    cartesian_eef_step:     0.01    # EE 보간 간격 [m]
    cartesian_min_fraction: 0.95    # 최소 보간 성공 비율 (이하 시 실패)


goal_relay_node:
  ros__parameters:

    # 실행 트리거 모드
    #   0: pick_goal 수신 즉시 Pick action 실행
    #      place_goal 수신 즉시 Place action 실행  (독립 실행)
    #   1: pick_goal + place_goal 모두 수신 후
    #      Pick action 완료 → Place action 순차 실행
    trigger_mode: 0

    # 단일 action(pick 또는 place) 결과를 기다리는 최대 시간 [s]
    # 한 번의 pick 또는 place 가 이 시간보다 오래 걸리면 sequence 실패 처리.
    # 0 이하 = 무제한 대기 (deadlock 위험, 비추천)
    action_result_timeout_sec: 600.0


motion_logger_node:
  ros__parameters:

    # EE 위치 추적 기준 프레임 (pick_place_node 의 setPoseReferenceFrame 과 일치)
    base_frame: "base_link"

    # end-effector 링크명 (URDF 기준)
    ee_frame: "tool0"

    # 노이즈 제거 최소 임계값
    min_delta_m:   0.0001  # EE 이동 최소값 [m]   — 이하면 무시
    min_delta_rad: 0.0001  # 관절 변화 최소값 [rad] — 이하면 무시

    # CSV 저장 디렉토리 (타임스탬프 기반 파일명 자동 생성)
    # 기본값: <package_share>/data/  (ament_index_cpp 로 자동 결정)
    # 오버라이드 예: ros2 run ... --ros-args -p log_dir:=/home/mk/my_logs
    # log_dir: ""   ← 비워두면 기본 경로 사용
